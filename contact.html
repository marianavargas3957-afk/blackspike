<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Blackspike Ltd</title>
    <link rel="stylesheet" href="assets/css/style.css">

</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo">Blackspike Ltd</a>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="contact-hero">
            <h1>Contact Us</h1>
            <p>Get in touch with us</p>
        </section>
        <section class="contact-content">
            <div class="container">
                <div class="contact-info">
                    <h2>Contact Information</h2>
                    <p><strong>Email:</strong> info@blackspike.com</p>
                    <p><strong>Phone:</strong> +44 1273 XXXXXX</p>
                    <p><strong>Address:</strong> Brighton, United Kingdom</p>
                </div>
                <form class="contact-form">
                    <input type="text" placeholder="Your Name" required>
                    <input type="email" placeholder="Your Email" required>
                    <textarea placeholder="Your Message" rows="5" required></textarea>
                    <button type="submit">Send Message</button>
                </form>
            </div>
        </section>
    </main>
